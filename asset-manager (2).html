<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Ledger</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f2ec; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; }
  select, input, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; } 
  ::-webkit-scrollbar-track { background: #ede9e0; }
  ::-webkit-scrollbar-thumb { background: #c8c4bc; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { PieChart, Pie, Cell, AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

// ── localStorage ポリフィル（window.storageの代替）──
const storage = {
  get: async (key) => {
    const value = localStorage.getItem(key);
    return value ? { value } : null;
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    return { value };
  },
};

// ── DESIGN TOKENS ──
const T = {
  paper:     "#f5f2ec",
  ink:       "#1a1814",
  inkMid:    "#4a4640",
  inkLight:  "#9a9690",
  inkGhost:  "#d0ccc4",
  rule:      "#c8c4bc",
  ruleLight: "#e0ddd8",
  red:       "#c0392b",
  green:     "#2d7a5a",
  cats: {
    現金預金: "#2c5f8a",
    投資:     "#2d7a5a",
    不動産:   "#7a4a2d",
    事業資産: "#5a2d7a",
    仮想通貨: "#b8860b",
    その他:   "#6a6a7a",
    負債:     "#c0392b",
  },
};

const CATEGORY_LIST = ["現金預金","投資","不動産","事業資産","仮想通貨","その他","負債"];
const CURRENCIES    = ["JPY","USD","EUR","BTC","ETH","その他"];
const DEFAULT_RATES = { JPY:1, USD:150, EUR:163, BTC:14000000, ETH:450000, その他:1 };

const INITIAL_ASSETS = [
  { id:1, category:"現金預金", name:"三菱UFJ 普通",        amount:1200000, currency:"JPY", note:"生活口座" },
  { id:2, category:"現金預金", name:"楽天銀行",             amount:800000,  currency:"JPY", note:"深薫堂用" },
  { id:3, category:"投資",     name:"eMAXIS Slim 全世界株", amount:2500000, currency:"JPY", note:"NISA" },
  { id:4, category:"投資",     name:"iDeCo",                amount:980000,  currency:"JPY", note:"" },
  { id:5, category:"不動産",   name:"仙台底地物件",          amount:8000000, currency:"JPY", note:"非再建築", cfIncome:48000, cfExpense:5000 },
  { id:6, category:"事業資産", name:"深薫堂 在庫",          amount:320000,  currency:"JPY", note:"コーヒー豆" },
  { id:7, category:"事業資産", name:"深薫堂 設備",          amount:450000,  currency:"JPY", note:"焙煎機" },
  { id:8, category:"仮想通貨", name:"Bitcoin",              amount:0.05,    currency:"BTC", note:"長期保有" },
  { id:9, category:"負債",     name:"クレジット残債",        amount:-120000, currency:"JPY", note:"" },
];

const fmt      = n => new Intl.NumberFormat("ja-JP",{style:"currency",currency:"JPY",maximumFractionDigits:0}).format(n);
const fmtShort = n => {
  const a = Math.abs(n);
  if (a >= 100000000) return `${(n/100000000).toFixed(2)}億円`;
  if (a >= 10000)     return `${(n/10000).toFixed(1)}万円`;
  return fmt(n);
};
const toJPY  = (amount, currency, rates) => amount * (rates[currency] || 1);
const nextId = assets => Math.max(0, ...assets.map(a => a.id)) + 1;

function MiniBar({ ratio, color }) {
  return (
    <div style={{height:2, background:T.ruleLight, borderRadius:1, overflow:"hidden", flex:1}}>
      <div style={{height:"100%", width:`${Math.min(ratio*100,100)}%`, background:color, borderRadius:1, transition:"width 0.6s ease"}} />
    </div>
  );
}

function ChartTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (
    <div style={{background:T.paper, border:`1px solid ${T.rule}`, padding:"10px 14px", fontSize:12, color:T.ink}}>
      <p style={{margin:"0 0 4px", color:T.inkLight, fontSize:10, letterSpacing:"0.1em"}}>{label}</p>
      {payload.map(p => <p key={p.name} style={{margin:0, color:T.inkMid}}>{p.name}: {fmt(p.value)}</p>)}
    </div>
  );
}

function AssetModal({ asset, onSave, onClose }) {
  const [form, setForm] = useState(asset || {category:"現金預金", name:"", amount:0, currency:"JPY", note:"", cfIncome:0, cfExpense:0});
  const set = (k,v) => setForm(f => ({...f, [k]:v}));
  const lbl = {fontSize:10, letterSpacing:"0.14em", color:T.inkLight, textTransform:"uppercase", display:"block", marginBottom:6};
  const inp = {border:"none", borderBottom:`1px solid ${T.rule}`, background:"transparent", padding:"8px 0", fontSize:14, color:T.ink, outline:"none", width:"100%", fontFamily:"inherit"};

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(245,242,236,0.88)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:T.paper, border:`1px solid ${T.rule}`, width:440, maxWidth:"92vw", padding:"40px 36px", position:"relative", maxHeight:"90vh", overflowY:"auto"}}>
        <p style={{margin:"0 0 28px", fontSize:12, letterSpacing:"0.15em", color:T.inkMid, textTransform:"uppercase"}}>
          {asset?.id ? "— EDIT ASSET —" : "— NEW ASSET —"}
        </p>
        <div style={{display:"flex", flexDirection:"column", gap:20}}>
          <div><label style={lbl}>Category</label>
            <select value={form.category} onChange={e=>set("category",e.target.value)} style={{...inp, cursor:"pointer"}}>
              {CATEGORY_LIST.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div><label style={lbl}>Name</label>
            <input value={form.name} onChange={e=>set("name",e.target.value)} style={inp} placeholder="資産名称" />
          </div>
          <div style={{display:"grid", gridTemplateColumns:"2fr 1fr", gap:20}}>
            <div><label style={lbl}>Amount</label>
              <input type="number" value={form.amount} onChange={e=>set("amount",parseFloat(e.target.value)||0)} style={inp} />
            </div>
            <div><label style={lbl}>Currency</label>
              <select value={form.currency} onChange={e=>set("currency",e.target.value)} style={{...inp, cursor:"pointer"}}>
                {CURRENCIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div><label style={lbl}>Note</label>
            <input value={form.note} onChange={e=>set("note",e.target.value)} style={inp} placeholder="任意" />
          </div>
          {form.category === "不動産" && (
            <div style={{borderTop:`1px solid ${T.ruleLight}`, paddingTop:20}}>
              <p style={{fontSize:10, letterSpacing:"0.14em", color:T.inkLight, textTransform:"uppercase", marginBottom:14}}>Cash Flow / Month</p>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:20}}>
                <div><label style={{...lbl, color:T.green}}>Income (¥)</label>
                  <input type="number" value={form.cfIncome||0} onChange={e=>set("cfIncome",parseFloat(e.target.value)||0)} style={{...inp, borderBottomColor:T.green}} />
                </div>
                <div><label style={{...lbl, color:T.red}}>Expense (¥)</label>
                  <input type="number" value={form.cfExpense||0} onChange={e=>set("cfExpense",parseFloat(e.target.value)||0)} style={{...inp, borderBottomColor:T.red}} />
                </div>
              </div>
            </div>
          )}
        </div>
        <div style={{display:"flex", justifyContent:"flex-end", gap:12, marginTop:32}}>
          <button onClick={onClose} style={{background:"none", border:`1px solid ${T.rule}`, color:T.inkMid, padding:"9px 22px", cursor:"pointer", fontSize:12, letterSpacing:"0.08em"}}>Cancel</button>
          <button onClick={()=>onSave(form)} style={{background:T.ink, border:"none", color:T.paper, padding:"9px 28px", cursor:"pointer", fontSize:12, letterSpacing:"0.1em"}}>Save</button>
        </div>
      </div>
    </div>
  );
}

function RatesModal({ rates, onSave, onClose }) {
  const [local, setLocal] = useState({...rates});
  const inp = {border:"none", borderBottom:`1px solid ${T.rule}`, background:"transparent", padding:"6px 0", fontSize:14, color:T.ink, outline:"none", flex:1, fontFamily:"inherit"};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(245,242,236,0.88)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:T.paper, border:`1px solid ${T.rule}`, width:360, padding:"36px 32px"}}>
        <p style={{margin:"0 0 24px", fontSize:12, letterSpacing:"0.15em", color:T.inkMid, textTransform:"uppercase"}}>— Exchange Rates —</p>
        {Object.keys(local).filter(k=>k!=="JPY").map(k=>(
          <div key={k} style={{display:"flex", alignItems:"center", gap:16, marginBottom:16}}>
            <span style={{fontSize:11, letterSpacing:"0.1em", color:T.inkLight, width:36}}>{k}</span>
            <input type="number" value={local[k]} onChange={e=>setLocal(l=>({...l,[k]:parseFloat(e.target.value)||1}))} style={inp} />
            <span style={{fontSize:11, color:T.inkLight}}>円</span>
          </div>
        ))}
        <div style={{display:"flex", justifyContent:"flex-end", gap:10, marginTop:24}}>
          <button onClick={onClose} style={{background:"none", border:`1px solid ${T.rule}`, color:T.inkMid, padding:"8px 18px", cursor:"pointer", fontSize:11}}>Cancel</button>
          <button onClick={()=>onSave(local)} style={{background:T.ink, border:"none", color:T.paper, padding:"8px 22px", cursor:"pointer", fontSize:11}}>Apply</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [assets,    setAssets]    = useState(INITIAL_ASSETS);
  const [rates,     setRates]     = useState(DEFAULT_RATES);
  const [snapshots, setSnapshots] = useState([]);
  const [tab,       setTab]       = useState("overview");
  const [openCat,   setOpenCat]   = useState(null);
  const [modal,     setModal]     = useState(null);
  const [loaded,    setLoaded]    = useState(false);
  const [toast,     setToast]     = useState("");

  useEffect(()=>{
    (async()=>{
      try {
        const a = await storage.get("pl_assets");    if(a) setAssets(JSON.parse(a.value));
        const r = await storage.get("pl_rates");     if(r) setRates(JSON.parse(r.value));
        const s = await storage.get("pl_snapshots"); if(s) setSnapshots(JSON.parse(s.value));
      } catch(e){}
      setLoaded(true);
    })();
  },[]);

  const persist = useCallback(async(a,r,s)=>{
    try {
      await storage.set("pl_assets",    JSON.stringify(a));
      await storage.set("pl_rates",     JSON.stringify(r));
      await storage.set("pl_snapshots", JSON.stringify(s));
    } catch(e){}
  },[]);

  useEffect(()=>{ if(loaded) persist(assets,rates,snapshots); },[assets,rates,snapshots,loaded]);

  const jpyVal      = a => toJPY(a.amount, a.currency, rates);
  const totalAssets = assets.filter(a=>a.category!=="負債").reduce((s,a)=>s+jpyVal(a),0);
  const totalDebt   = Math.abs(assets.filter(a=>a.category==="負債").reduce((s,a)=>s+jpyVal(a),0));
  const netWorth    = totalAssets - totalDebt;
  const cfIncome    = assets.reduce((s,a)=>s+(a.cfIncome||0),0);
  const cfExpense   = assets.reduce((s,a)=>s+(a.cfExpense||0),0);
  const cfNet       = cfIncome - cfExpense;

  const catTotals = CATEGORY_LIST.map(c=>({
    name:c, value:Math.abs(assets.filter(a=>a.category===c).reduce((s,a)=>s+jpyVal(a),0)), color:T.cats[c],
  })).filter(d=>d.value>0);

  const saveSnap = ()=>{
    const date    = new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit"});
    const snap    = {date, netWorth, totalAssets, totalDebt};
    const updated = [...snapshots.filter(s=>s.date!==date), snap].sort((a,b)=>a.date.localeCompare(b.date));
    setSnapshots(updated);
    setToast("記録しました");
    setTimeout(()=>setToast(""),2200);
  };

  const saveAsset = form => {
    setAssets(prev => form.id ? prev.map(a=>a.id===form.id?form:a) : [...prev,{...form,id:nextId(prev)}]);
    setModal(null);
  };

  const exportCSV = ()=>{
    const rows = [["カテゴリ","名称","円換算","通貨","元金額","メモ"],...assets.map(a=>[a.category,a.name,Math.round(jpyVal(a)),a.currency,a.amount,a.note])];
    const blob = new Blob(["\uFEFF"+rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"});
    Object.assign(document.createElement("a"),{href:URL.createObjectURL(blob),download:`資産_${new Date().toLocaleDateString("ja-JP")}.csv`}).click();
  };

  const NAV = [{id:"overview",label:"Overview"},{id:"assets",label:"Assets"},{id:"cf",label:"Cash Flow"},{id:"history",label:"History"}];

  if(!loaded) return <div style={{background:T.paper,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:T.inkLight,letterSpacing:"0.1em"}}>Loading…</div>;

  return (
    <div style={{background:T.paper, minHeight:"100vh", color:T.ink, position:"relative"}}>
      {/* 方眼グリッド */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,
        backgroundImage:`linear-gradient(${T.ruleLight} 1px,transparent 1px),linear-gradient(90deg,${T.ruleLight} 1px,transparent 1px)`,
        backgroundSize:"40px 40px",opacity:0.4}} />

      {/* ヘッダー */}
      <header style={{position:"sticky",top:0,zIndex:50,background:T.paper,borderBottom:`1px solid ${T.rule}`,padding:"0 32px"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"stretch",justifyContent:"space-between",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <svg width={20} height={20} viewBox="0 0 20 20">
              <rect x={1} y={1} width={18} height={18} fill="none" stroke={T.ink} strokeWidth={1}/>
              <line x1={1} y1={10} x2={19} y2={10} stroke={T.inkLight} strokeWidth={0.5}/>
              <line x1={10} y1={1} x2={10} y2={19} stroke={T.inkLight} strokeWidth={0.5}/>
              <circle cx={10} cy={10} r={3} fill={T.ink}/>
            </svg>
            <span style={{fontSize:13,letterSpacing:"0.18em",textTransform:"uppercase"}}>Portfolio Ledger</span>
          </div>
          <nav style={{display:"flex",alignItems:"stretch"}}>
            {NAV.map(n=>(
              <button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",borderBottom:tab===n.id?`2px solid ${T.ink}`:"2px solid transparent",color:tab===n.id?T.ink:T.inkLight,padding:"0 18px",cursor:"pointer",fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase"}}>
                {n.label}
              </button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setModal({type:"rates"})} style={{background:"none",border:`1px solid ${T.rule}`,color:T.inkMid,padding:"5px 12px",cursor:"pointer",fontSize:10,letterSpacing:"0.1em"}}>FX</button>
            <button onClick={exportCSV} style={{background:"none",border:`1px solid ${T.rule}`,color:T.inkMid,padding:"5px 12px",cursor:"pointer",fontSize:10,letterSpacing:"0.1em"}}>CSV</button>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1100,margin:"0 auto",padding:"48px 32px",position:"relative",zIndex:1}}>

        {/* ── OVERVIEW ── */}
        {tab==="overview" && (
          <div>
            <div style={{marginBottom:56}}>
              <p style={{fontSize:10,letterSpacing:"0.2em",color:T.inkLight,textTransform:"uppercase",margin:"0 0 12px"}}>Net Worth</p>
              <div style={{display:"flex",alignItems:"baseline",gap:16}}>
                <span style={{fontSize:52,fontWeight:300,letterSpacing:"-0.02em",lineHeight:1}}>{fmtShort(netWorth)}</span>
                {snapshots.length>=2&&(()=>{const prev=snapshots[snapshots.length-2];const diff=netWorth-prev.netWorth;return<span style={{fontSize:16,color:diff>=0?T.green:T.red}}>{diff>=0?"+":""}{fmtShort(diff)}</span>;})()}
              </div>
              <div style={{display:"flex",gap:32,marginTop:20,flexWrap:"wrap"}}>
                {[["Total Assets",totalAssets,T.inkMid],["Total Debt",totalDebt,T.red],["Monthly CF",cfNet,cfNet>=0?T.green:T.red]].map(([lbl,val,color])=>(
                  <div key={lbl}>
                    <p style={{fontSize:9,letterSpacing:"0.15em",color:T.inkLight,margin:"0 0 4px",textTransform:"uppercase"}}>{lbl}</p>
                    <p style={{fontSize:20,color,margin:0,fontWeight:300}}>{fmtShort(val)}</p>
                  </div>
                ))}
              </div>
            </div>

            <div style={{borderTop:`1px solid ${T.rule}`,marginBottom:40}}/>

            <div style={{display:"grid",gridTemplateColumns:"1fr 240px",gap:48,alignItems:"start"}}>
              <div>
                <p style={{fontSize:10,letterSpacing:"0.2em",color:T.inkLight,textTransform:"uppercase",margin:"0 0 20px"}}>Allocation</p>
                {catTotals.map(d=>(
                  <div key={d.name} style={{marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:5}}>
                      <div style={{width:8,height:8,background:d.color,flexShrink:0}}/>
                      <span style={{fontSize:12,color:T.inkMid,flex:1,letterSpacing:"0.04em"}}>{d.name}</span>
                      <span style={{fontSize:13,color:T.ink}}>{fmtShort(d.value)}</span>
                      <span style={{fontSize:10,color:T.inkLight,width:36,textAlign:"right"}}>{((d.value/totalAssets)*100).toFixed(1)}%</span>
                    </div>
                    <MiniBar ratio={d.value/totalAssets} color={d.color}/>
                  </div>
                ))}
              </div>
              <ResponsiveContainer width="100%" height={220}>
                <PieChart>
                  <Pie data={catTotals} cx="50%" cy="50%" innerRadius={68} outerRadius={100} paddingAngle={2} dataKey="value" strokeWidth={0}>
                    {catTotals.map(d=><Cell key={d.name} fill={d.color}/>)}
                  </Pie>
                  <Tooltip content={<ChartTooltip/>}/>
                </PieChart>
              </ResponsiveContainer>
            </div>

            <div style={{borderTop:`1px solid ${T.rule}`,margin:"40px 0"}}/>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <button onClick={saveSnap} style={{background:"none",border:`1px solid ${T.ink}`,color:T.ink,padding:"10px 28px",cursor:"pointer",fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase"}}>Record Snapshot</button>
              {toast&&<span style={{fontSize:11,color:T.green,letterSpacing:"0.08em"}}>✓ {toast}</span>}
            </div>
          </div>
        )}

        {/* ── ASSETS ── */}
        {tab==="assets" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:32}}>
              <p style={{fontSize:10,letterSpacing:"0.2em",color:T.inkLight,textTransform:"uppercase",margin:0}}>Asset Registry</p>
              <button onClick={()=>setModal({type:"asset",asset:null})} style={{background:T.ink,border:"none",color:T.paper,padding:"9px 24px",cursor:"pointer",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase"}}>+ Add Asset</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"3fr 2fr 1fr auto",gap:16,padding:"8px 0",borderBottom:`1px solid ${T.rule}`}}>
              {["Name / Category","Amount","Currency",""].map(h=><span key={h} style={{fontSize:9,letterSpacing:"0.14em",color:T.inkLight,textTransform:"uppercase"}}>{h}</span>)}
            </div>
            {CATEGORY_LIST.map(cat=>{
              const catAssets=assets.filter(a=>a.category===cat);
              if(!catAssets.length) return null;
              const catTotal=catAssets.reduce((s,a)=>s+jpyVal(a),0);
              const isOpen=openCat===cat;
              const color=T.cats[cat];
              return (
                <div key={cat}>
                  <button onClick={()=>setOpenCat(isOpen?null:cat)} style={{width:"100%",background:"none",border:"none",borderBottom:`1px solid ${T.ruleLight}`,padding:"14px 0",cursor:"pointer",display:"grid",gridTemplateColumns:"3fr 2fr 1fr auto",gap:16,alignItems:"center",textAlign:"left"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:3,height:14,background:color,flexShrink:0}}/>
                      <span style={{fontSize:12,letterSpacing:"0.06em",color:T.inkMid,textTransform:"uppercase"}}>{cat}</span>
                      <span style={{fontSize:10,color:T.inkGhost}}>({catAssets.length})</span>
                    </div>
                    <span style={{fontSize:14,color:cat==="負債"?T.red:T.ink}}>{fmt(Math.abs(catTotal))}</span>
                    <span style={{fontSize:10,color:T.inkLight}}>JPY</span>
                    <span style={{fontSize:10,color:T.inkLight}}>{isOpen?"▲":"▼"}</span>
                  </button>
                  {isOpen&&catAssets.map(a=>(
                    <div key={a.id} style={{display:"grid",gridTemplateColumns:"3fr 2fr 1fr auto",gap:16,alignItems:"center",padding:"11px 0 11px 13px",borderBottom:`1px solid ${T.ruleLight}`,background:`${color}06`}}>
                      <div>
                        <p style={{margin:0,fontSize:13,color:T.ink}}>{a.name}</p>
                        <div style={{display:"flex",gap:12,marginTop:3}}>
                          {a.note&&<span style={{fontSize:10,color:T.inkLight}}>{a.note}</span>}
                          {a.cfIncome>0&&<span style={{fontSize:10,color:T.green}}>+{fmt(a.cfIncome)}/月</span>}
                          {a.cfExpense>0&&<span style={{fontSize:10,color:T.red}}>−{fmt(a.cfExpense)}/月</span>}
                        </div>
                      </div>
                      <div>
                        <p style={{margin:0,fontSize:13,color:T.ink}}>{a.currency==="JPY"?fmt(a.amount):fmt(toJPY(a.amount,a.currency,rates))}</p>
                        {a.currency!=="JPY"&&<p style={{margin:0,fontSize:10,color:T.inkLight}}>{a.amount} {a.currency}</p>}
                      </div>
                      <span style={{fontSize:11,color:T.inkLight}}>{a.currency}</span>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setModal({type:"asset",asset:a})} style={{background:"none",border:`1px solid ${T.rule}`,color:T.inkMid,padding:"4px 10px",cursor:"pointer",fontSize:10}}>Edit</button>
                        <button onClick={()=>{if(confirm("削除しますか？"))setAssets(p=>p.filter(x=>x.id!==a.id));}} style={{background:"none",border:`1px solid ${T.rule}`,color:T.red,padding:"4px 8px",cursor:"pointer",fontSize:10}}>×</button>
                      </div>
                    </div>
                  ))}
                  {isOpen&&<button onClick={()=>setModal({type:"asset",asset:{category:cat}})} style={{width:"100%",background:"none",border:"none",borderBottom:`1px solid ${T.ruleLight}`,padding:"10px 13px",cursor:"pointer",textAlign:"left",fontSize:11,color:T.inkLight}}>+ {cat}を追加</button>}
                </div>
              );
            })}
          </div>
        )}

        {/* ── CF ── */}
        {tab==="cf" && (
          <div>
            <p style={{fontSize:10,letterSpacing:"0.2em",color:T.inkLight,textTransform:"uppercase",margin:"0 0 32px"}}>Cash Flow — Monthly</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:T.rule,border:`1px solid ${T.rule}`,marginBottom:40}}>
              {[["Income",cfIncome,T.green],["Expense",cfExpense,T.red],["Net CF",cfNet,cfNet>=0?T.green:T.red]].map(([lbl,val,color])=>(
                <div key={lbl} style={{background:T.paper,padding:"24px 28px"}}>
                  <p style={{fontSize:9,letterSpacing:"0.18em",color:T.inkLight,textTransform:"uppercase",margin:"0 0 10px"}}>{lbl}</p>
                  <p style={{fontSize:28,color,margin:"0 0 4px",fontWeight:300}}>{fmtShort(val)}</p>
                  <p style={{fontSize:10,color:T.inkLight,margin:0}}>年換算 {fmtShort(val*12)}</p>
                </div>
              ))}
            </div>
            <div style={{borderTop:`1px solid ${T.rule}`}}>
              <div style={{display:"grid",gridTemplateColumns:"3fr 1fr 1fr 1fr",gap:16,padding:"10px 0",borderBottom:`1px solid ${T.rule}`}}>
                {["Property","Income","Expense","Net"].map(h=><span key={h} style={{fontSize:9,letterSpacing:"0.14em",color:T.inkLight,textTransform:"uppercase"}}>{h}</span>)}
              </div>
              {assets.filter(a=>a.cfIncome||a.cfExpense).length===0
                ?<p style={{padding:"24px 0",color:T.inkLight,fontSize:12}}>不動産資産にCFを入力してください。</p>
                :assets.filter(a=>a.cfIncome||a.cfExpense).map(a=>{
                  const net=(a.cfIncome||0)-(a.cfExpense||0);
                  return(
                    <div key={a.id} style={{display:"grid",gridTemplateColumns:"3fr 1fr 1fr 1fr",gap:16,padding:"13px 0",borderBottom:`1px solid ${T.ruleLight}`,alignItems:"center"}}>
                      <div><p style={{margin:0,fontSize:13,color:T.ink}}>{a.name}</p>{a.note&&<p style={{margin:0,fontSize:10,color:T.inkLight}}>{a.note}</p>}</div>
                      <span style={{fontSize:13,color:T.green}}>{fmt(a.cfIncome||0)}</span>
                      <span style={{fontSize:13,color:T.red}}>−{fmt(a.cfExpense||0)}</span>
                      <span style={{fontSize:13,color:net>=0?T.green:T.red,fontWeight:500}}>{fmt(net)}</span>
                    </div>
                  );
                })
              }
            </div>
          </div>
        )}

        {/* ── HISTORY ── */}
        {tab==="history" && (
          <div>
            <p style={{fontSize:10,letterSpacing:"0.2em",color:T.inkLight,textTransform:"uppercase",margin:"0 0 32px"}}>Historical Record</p>
            {snapshots.length<2
              ?<div style={{border:`1px solid ${T.ruleLight}`,padding:"48px 0",textAlign:"center"}}>
                <p style={{color:T.inkLight,fontSize:12,letterSpacing:"0.06em"}}>2件以上の記録が必要です。</p>
                <p style={{color:T.inkGhost,fontSize:11}}>現在 {snapshots.length} 件</p>
              </div>
              :<div style={{marginBottom:40}}>
                <ResponsiveContainer width="100%" height={260}>
                  <AreaChart data={snapshots} margin={{left:0,right:0}}>
                    <defs>
                      <linearGradient id="gNet" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%"  stopColor={T.ink} stopOpacity={0.12}/>
                        <stop offset="95%" stopColor={T.ink} stopOpacity={0}/>
                      </linearGradient>
                    </defs>
                    <XAxis dataKey="date" tick={{fill:T.inkLight,fontSize:10}} axisLine={false} tickLine={false}/>
                    <YAxis tick={{fill:T.inkLight,fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>fmtShort(v)}/>
                    <Tooltip content={<ChartTooltip/>}/>
                    <Area type="monotone" dataKey="netWorth" stroke={T.ink} strokeWidth={1.5} fill="url(#gNet)" name="純資産" dot={{fill:T.ink,r:3,strokeWidth:0}}/>
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            }
            <div style={{borderTop:`1px solid ${T.rule}`}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:16,padding:"10px 0",borderBottom:`1px solid ${T.rule}`}}>
                {["Date","Net Worth","Total Assets","Total Debt"].map(h=><span key={h} style={{fontSize:9,letterSpacing:"0.14em",color:T.inkLight,textTransform:"uppercase"}}>{h}</span>)}
              </div>
              {[...snapshots].reverse().map((s,i)=>{
                const prev=[...snapshots].reverse()[i+1];
                const diff=prev?s.netWorth-prev.netWorth:null;
                return(
                  <div key={s.date} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:16,padding:"13px 0",borderBottom:`1px solid ${T.ruleLight}`,alignItems:"center"}}>
                    <span style={{fontSize:12,color:T.inkMid}}>{s.date}</span>
                    <div>
                      <span style={{fontSize:13,color:T.ink}}>{fmt(s.netWorth)}</span>
                      {diff!==null&&<span style={{fontSize:10,color:diff>=0?T.green:T.red,marginLeft:8}}>{diff>=0?"+":""}{fmtShort(diff)}</span>}
                    </div>
                    <span style={{fontSize:13,color:T.inkMid}}>{fmt(s.totalAssets)}</span>
                    <span style={{fontSize:13,color:T.red}}>−{fmt(s.totalDebt)}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </main>

      {modal?.type==="asset"&&<AssetModal asset={modal.asset} onSave={saveAsset} onClose={()=>setModal(null)}/>}
      {modal?.type==="rates"&&<RatesModal rates={rates} onSave={r=>{setRates(r);setModal(null);}} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
